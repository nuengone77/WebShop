<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunmee Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Comments -->
   <div class="heading">
    <h1 class="head">Bunmee Shop</h1>
   </div>
  <a href="https://www.w3schools.com/html/html_links.asp" target="_blank">Learn HTML</a>
     <a href="admin.html" target="_blank">Admin page</a>

  <h4>รายการที่สามารถสั่งซื้อได้ตอนนี้</h4>
  <ul>
    <li>ส้มเขียวหวาน<b>(มีจำกัด)</b></li>
    <li>ส้มจีน</li>
    <li>ส้มสายน้ำผึ้ง</li>
  </ul>
  <h3>ตารางแสดงราคาส้มปัจจุบัน</h3>
  <table border="1">
    <thead>
      <th>รูป</th>
      <th>ชื่อ</th>
      <th>ราคา</th>
      <th>จำนวนที่เหลือ</th>
    </thead>
    <tbody>
      <!--ส้มเขียวหวาน-->
      <tr class="orange_green">
        <td><img src="image/green.jpg" alt="" width="200px" height="200px"></td>
        <td>ส้มเขียวหวาน</td>
        <td>โลละ 24</td>
        <td>234 โล</td>
      </tr>
      <!--ส้มจีน-->
      <tr class="orange_china">
        <td><img src="image/china.jpg" alt="" width="200px" height="200px"></td>
        <td>ส้มจีน</td>
        <td>โลละ 30</td>
        <td>125 โล</td>
      </tr>
      <!--ส้มสายน้ำผี้ง-->
      <tr class="orange_bee">
        <td><img src="image/bee.png" alt="" width="200px" height="200px"></td>
        <td>ส้มสายน้ำผี้ง</td>
        <td>โลละ 27</td>
        <td>453 โล</td>
      </tr>
    </tbody>
  </table>
     
     

</body> 
</html>
